<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせポータル</title>
</head>
<body>

<h1>お問い合わせポータル</h1>

<h2>FAQ</h2>

<ul>
    <li>パスワードをリセットしたい</li>
    <li>ログインできない</li>
    <li>契約内容を確認したい</li>
</ul>

<h2>お問い合わせフォーム</h2>

<form>
    <p>氏名</p>
    <input type="text">

    <p>メールアドレス</p>
    <input type="email">

    <p>お問い合わせ内容</p>
    <textarea rows="5"></textarea>

    <br><br>

    <button type="submit">
        送信
    </button>
</form>

</body>
</html>
